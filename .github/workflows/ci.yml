name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Least-privilege token: this workflow only reads code and runs tests.
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install pinned runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock

      - name: Audit dependencies for known CVEs
        run: |
          pip install pip-audit
          pip-audit -r requirements.lock

      - name: Install package and dev tools
        run: pip install -e ".[dev]"

      - name: Check formatting with ruff
        run: ruff format --check src/ tests/ streamlit_app/

      - name: Lint with ruff
        run: ruff check src/ tests/ streamlit_app/

      - name: Run tests
        run: pytest --tb=short
