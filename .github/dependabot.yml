version: 2
updates:
  # Keep GitHub Actions pinned to current SHA digests.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  # Watch for new releases of direct pip dependencies.
  # Dependabot will open PRs to update pyproject.toml; regenerate
  # requirements.lock after merging with:
  #   pip-compile pyproject.toml --output-file requirements.lock
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
